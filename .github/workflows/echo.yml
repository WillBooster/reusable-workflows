name: Show a given text

on:
  workflow_call:
    inputs:
      text:
        required: true
        type: string
    outputs:
      text:
        value: ${{ jobs.echo.outputs.text }}

jobs:
  echo:
    runs-on: ${{ (!github.event.repository.private && 'ubuntu-latest') || fromJSON('["self-hosted", "medium"]') }}
    env:
      FORCE_COLOR: 3
    outputs:
      text: ${{ steps.echo.outputs.text }}
    steps:
      - uses: actions/checkout@v7.0.0
      - id: echo
        # The text may carry attacker-controlled content (e.g. a PR title), so it reaches the
        # shell only via env and is always quoted.
        run: |
          echo "text=$TEXT" >> "$GITHUB_OUTPUT"
        env:
          TEXT: ${{ inputs.text }}
