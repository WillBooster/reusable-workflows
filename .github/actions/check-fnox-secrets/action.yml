name: Check fnox secrets
description: >-
  Validate that the repository's fnox secrets are resolvable with the provided FNOX_AGE_KEY.
  fnox exits 0 and silently omits unresolvable secrets by default, and a mere key-presence check
  cannot tell a wrong key from a config needing no key at all (plaintext defaults), so this runs a
  strict-mode resolution once mise installed fnox (--all includes env="exec"/env=false secrets;
  --no-daemon defeats a stale daemon cache). WB_ENV selects the profile to check and must be
  defined and name a declared profile (or the base "development") whenever a repository-scoped
  fnox config exists — fnox silently falls back to the base secrets for an undefined profile,
  which would validate (and later export) development values for a production job.
inputs:
  mode:
    description: '"error" fails the job on unresolvable secrets; "warning" only annotates the run.'
    default: error
  working_directory:
    description: >-
      Additional directory whose effective fnox configuration must also resolve (e.g. the deploy
      script's working directory; fnox resolves configs hierarchically through ancestors).
    default: ''
runs:
  using: composite
  steps:
    - name: Ensure fnox secrets are resolvable
      shell: bash
      env:
        MODE: ${{ inputs.mode }}
        WORKING_DIRECTORY: ${{ inputs.working_directory }}
      run: |
        FNOX_ARGS=(--all --format json --no-daemon --if-missing error)
        if [[ -n "$WB_ENV" ]]; then FNOX_ARGS+=(--profile "$WB_ENV"); fi
        REPO_ROOT="$PWD"
        # Exit codes: 0 = passed or nothing to check, 3 = WB_ENV undefined, 4 = WB_ENV names no
        # declared profile, anything else = resolution failure.
        run_check() (
          cd "$1" || exit 1
          # A failing `fnox config-files` (e.g. a broken fnox.toml) must fail the check, not skip it.
          config_files="$(FNOX_NON_INTERACTIVE=true fnox config-files)" || exit 1
          # `fnox config-files` also lists GLOBAL configs (e.g. $XDG_CONFIG_HOME/fnox/config.toml),
          # which exist on persistent self-hosted runners even for fnox-less repositories; only a
          # repository-scoped config may subject the repository to these checks.
          grep -qF "$REPO_ROOT/" <<< "$config_files" || exit 0
          [[ -n "$WB_ENV" ]] || exit 3
          # fnox silently falls back to the base secrets when the requested profile is not
          # declared (verified with fnox 1.30.0: `fnox export --profile production` exits 0 with
          # base values), so a typoed or missing profile would validate development secrets for a
          # production job. The base carries the development values per the org standard, so
          # "development" itself needs no declared profile.
          if [[ "$WB_ENV" != 'development' ]] &&
            ! FNOX_NON_INTERACTIVE=true fnox profiles | awk '{ print $1 }' | grep -qxF -- "$WB_ENV"; then
            exit 4
          fi
          FNOX_NON_INTERACTIVE=true fnox export "${FNOX_ARGS[@]}" > /dev/null
        )
        report() {
          # $2: consequence sentence appended only in warning mode, specific to the failed check.
          if [[ "$MODE" == 'warning' ]]; then
            echo "::warning::$1${2:+; $2}"
          else
            echo "::error::$1"
            exit 1
          fi
        }
        check_dir() {
          run_check "$1"
          case $? in
            0) ;;
            3)
              report "WB_ENV is not defined but a fnox configuration exists$2; the calling workflow must export it (e.g. via the \"environment\" input) so the matching fnox profile is checked" \
                'this run did not validate the profile-specific secrets'
              ;;
            4)
              report "WB_ENV \"$WB_ENV\" does not name a profile declared in the fnox configuration$2; fnox would silently fall back to the base (development) secrets" \
                'this run did not validate the profile-specific secrets'
              ;;
            *)
              report "fnox secrets$2 cannot be resolved; check the FNOX_AGE_KEY secret" \
                'unresolvable age-encrypted values are silently omitted in this run'
              ;;
          esac
        }
        # `command -v` alone is fooled by mise SHIMS on persistent self-hosted runners: a global
        # fnox shim exists even for repos that do not pin fnox, and errors with "No version is
        # set for shim" — which must mean "no fnox here", not a failed check.
        if command -v fnox > /dev/null && fnox --version > /dev/null 2>&1; then
          check_dir . ''
          if [[ -n "$WORKING_DIRECTORY" && "$WORKING_DIRECTORY" != '.' ]]; then
            check_dir "$WORKING_DIRECTORY" " for working_directory \"$WORKING_DIRECTORY\""
          fi
        fi
